name: Build and Test Bot

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

env:
  SERVER_HOST: play.wactigo.net
  SERVER_PORT: "19132"
  BOT_NAME: WactigoTestBot

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust toolchain + aarch64-linux-android target
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-linux-android

    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      id: setup_ndk
      with:
        ndk-version: r26d
        add-to-path: false

    - name: Configure cargo for aarch64-linux-android
      run: |
        mkdir -p ~/.cargo
        cat > ~/.cargo/config.toml << 'EOF'
        [target.aarch64-linux-android]
        linker = "${{ steps.setup_ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang"
        ar = "${{ steps.setup_ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar"
        EOF
        cat ~/.cargo/config.toml

    - name: Cache Cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-android-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Build for Android aarch64 (Termux)
      run: cargo build --release --target aarch64-linux-android

    - name: Verify binary
      run: |
        echo "=== Binary info ==="
        file target/aarch64-linux-android/release/bot
        ls -la target/aarch64-linux-android/release/bot

    - name: Upload Android binary
      uses: actions/upload-artifact@v4
      with:
        name: bot-android-aarch64
        path: target/aarch64-linux-android/release/bot
        retention-days: 30

  build-and-test-linux:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-linux-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Build bot (Linux x86_64)
      run: cargo build --release

    - name: Run bot against ${{ env.SERVER_HOST }}
      run: |
        echo "============================================"
        echo "  CONÉCTATE A: ${{ env.SERVER_HOST }}:${{ env.SERVER_PORT }}"
        echo "  Bot name: ${{ env.BOT_NAME }}"
        echo "============================================"
        echo ""
        echo "Starting bot connection..."
        timeout 120 ./target/release/bot -h ${{ env.SERVER_HOST }} -p ${{ env.SERVER_PORT }} -n ${{ env.BOT_NAME }} || true
        
        echo ""
        echo "=== Bot session ended ==="
        echo "Checking for downloaded resource packs..."
        ls -la target/resource_packs/ || echo "No resource_packs directory found"
        find target/resource_packs/ -type f 2>/dev/null || echo "No files in resource_packs"

    - name: Package resource packs into zip
      if: always()
      run: |
        echo "Packaging resource packs..."
        mkdir -p artifacts
        
        if [ -d "target/resource_packs" ] && [ "$(ls -A target/resource_packs 2>/dev/null)" ]; then
          echo "Found resource packs, creating zip..."
          
          # Create a zip with all downloaded resource packs
          cd target/resource_packs
          zip -r ../../artifacts/resource_packs.zip . || true
          cd ../..
          
          # Also create individual zips for each pack
          for dir in target/resource_packs/*/; do
            if [ -d "$dir" ]; then
              pack_name=$(basename "$dir")
              echo "Packaging pack: $pack_name"
              cd "$dir"
              zip -r "../../../artifacts/${pack_name}.zip" . || true
              cd ../../..
            fi
          done
          
          # Also copy .zip files directly saved by the bot
          find target/resource_packs/ -name "*.zip" -exec cp {} artifacts/ \; 2>/dev/null || true
          
          echo "=== Resource pack contents ==="
          find target/resource_packs/ -type f -exec ls -la {} \;
        else
          echo "No resource packs were downloaded. Creating empty marker."
          echo "No resource packs downloaded" > artifacts/no_packs.txt
        fi
        
        # Save the bot binary (Linux for testing)
        cp target/release/bot artifacts/bot-linux || true
        
        # Save packet logs if they exist
        if ls *.pkt 2>/dev/null; then
          zip artifacts/packet_logs.zip *.pkt || true
        fi
        
        ls -la artifacts/

    - name: Upload resource pack artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: resource-packs
        path: artifacts/
        retention-days: 30
        if-no-files-found: warn

    - name: Summary
      if: always()
      run: |
        echo "============================================"
        echo "  SERVIDOR: ${{ env.SERVER_HOST }}:${{ env.SERVER_PORT }}"
        echo "  Para unirse desde Termux:"
        echo "    ./bot -h ${{ env.SERVER_HOST }} -p ${{ env.SERVER_PORT }} -n TuNombre"
        echo "============================================"
        echo ""
        echo "=== Build and Test Summary ==="
        echo "Bot binary (Linux): $(file target/release/bot 2>/dev/null || echo 'not found')"
        echo "Bot binary (Android aarch64): disponible en artifact 'bot-android-aarch64'"
        echo ""
        echo "Resource packs downloaded:"
        if [ -d "target/resource_packs" ]; then
          find target/resource_packs/ -type f -exec echo "  - {}" \;
        else
          echo "  (none)"
        fi
        echo ""
        echo "Artifacts created:"
        ls -la artifacts/ 2>/dev/null || echo "  (none)"
        echo ""
        echo "============================================"
        echo "  DESCARGAR BINARIO PARA TERMUX:"
        echo "  Artifact: bot-android-aarch64"
        echo "============================================"
